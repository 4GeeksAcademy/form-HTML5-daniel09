<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

<title>Document</title>
</head>

<body>
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">Payment form example</h4>

            </div>

            <div class="card-body">
                <div class="alert alert-danger">
                    Some fields are missing
                </div>
                <div class="row mb-3">

                    <div class="col-md-5">
                        <label class="form-label">Card #</label>
                        <input type="text" class="form-control" placeholder="XXXXXXXXXXXXXXXX">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">CVC #</label>
                        <input type="text" class="form-control" placeholder="0000"
                        minlength="3"
                        maxlength="4">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Amount</label>
                        <div class="input-group amount-group">
                            <span class="input-group-text dollar">$</span>
                            <input type="text" class="form-control amount-input" placeholder="Amount">
                        </div>
                    </div>

                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">State</label>
                        <select class="form-select">
                            <option selected>Pick a state</option>
                            <option>New York</option>
                            <option>California</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Postal Code</label>
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">We accept:</label>
                            <div class="card-options">

                                <label class="card-option">
                                    <input type="radio" name="card">
                                    <span class="card-box">
                                        <i class="fa-brands fa-cc-mastercard"></i>
                                    </span>
                                </label>

                                <label class="card-option">
                                    <input type="radio" name="card">
                                    <span class="card-box">
                                        <i class="fa-brands fa-cc-visa"></i>
                                    </span>
                                </label>

                                <label class="card-option">
                                    <input type="radio" name="card">
                                    <span class="card-box">
                                        <i class="fa-brands fa-cc-amex"></i>
                                    </span>
                                </label>

                                <label class="card-option">
                                    <input type="radio" name="card">
                                    <span class="card-box">
                                        <i class="fa-brands fa-cc-discover"></i>

                                    </span>
                                </label>





                            </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="3"></textarea>
                        <small class="text-muted">Add any notes here.</small>
                    </div>
                </div>


            </div>

            <div class="card-footer d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary">Cancel</button>
                <button type="button" class="btn btn-primary">Send</button>
            </div>
            



        </div>

    </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
